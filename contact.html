<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emily Sweet Apparel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/contact.css">
  <link rel="stylesheet" href="css/threadpen.css">
</head>
<body>
  <div class="thread-stage">
      <svg class="thread-svg" aria-hidden="true">
          <g id="thread-layer"></g>
      </svg>
  </div>
  <div id="site-header" class="site-header"></div>

  <main class="section">
    <div class="container">
      <div class="section-heading">
        <p class="eyebrow">Contact</p>
        <h1>Get in touch</h1>
        <p>Reach out for pricing questions, fittings, alterations, or custom work.</p>
      </div>

      <div class="contact-grid">
        <div class="contact-info">
          <h2>Contact Information</h2>
          <p><strong>Phone:</strong> (208) 541-0207</p>
          <p><strong>Email:</strong> callemily01@gmail.com</p>
        </div>

        <form class="contact-form">
          <input type="text" placeholder="Name" />
          <input type="email" placeholder="Email" />
          <input type="text" placeholder="Type of service" />
          <textarea rows="6" placeholder="Your message"></textarea>
          <button class="btn btn-primary" type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/includes.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/threadpen.js"></script>
</body>
</html>
